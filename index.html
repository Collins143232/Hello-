<!DOCTYPE html>
<html lang="en">
<head>
  <title>Profile Card</title><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }@media (max-width: 400px) {
  .profile-card {
    width: 90%;
    padding: 15px;
  }
}    
    .card {
      background: #2a2a2a;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: white;
      width: 300px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    
    .card img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
    }
    
    .card h2 {
      margin: 10px 0 5px;
      color: #fff;
    }
    
    .card p {
      margin: 0 0 20px;
      color: #aaa;
    }
    
    .socials a {
      color: white;
      margin: 0 10px;
      font-size: 24px;
      transition: 0.3s;
    }
    
    .socials a:hover {
      color: #facc15;
      transform: scale(1.2);
    }
  </style>.socials a:hover {
  color: #facc15;
  transform: scale(1.2);
}

@media (max-width: 400px) {
  .card {
    width: 90%;
    padding: 15px;
  }
  
  .card img {
    width: 80px;
    height: 80px;
  }
  
  .socials a {
    font-size: 18px;
    margin: 0 8px;
  }
}
</style>
</head><meta name="viewport" content="width=device-width, initial-scale=1.0">
