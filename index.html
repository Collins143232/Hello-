<!DOCTYPE html>
<html lang="en">
<head>
  <title>Profile Card</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    
    .card {
      background: #2a2a2a;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: white;
      width: 300px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    
    .card img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
    }
    
    .card h2 {
      margin: 10px 0 5px;
      color: #fff;
    }
    
    .card p {
      margin: 0 0 20px;
      color: #aaa;
    }
    
    .socials a {
      color: white;
      margin: 0 10px;
      font-size: 24px;
      transition: 0.3s;
    }
    
    .socials a:hover {
      color: #facc15;
      transform: scale(1.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://picsum.photos/200" alt="Profile Picture">
    <h2>C0llins</h2>
    <p>Learning Coding</p>
    <div class="socials">
      <a href="https://github.com/Collins143232" target="_blank">
        <i class="fab fa-github"></i>
      </a>
      <a href="https://twitter.com/" target="_blank">
        <i class="fab fa-twitter"></i>
      </a>
      <a href="https://linkedin.com/in/nana-gyamfi-1b9aa627b" target="_blank">
        <i class="fab fa-linkedin"></i>
      </a>
    </div>
  </div>
</body>
</html>
